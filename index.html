<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HiPatagonia.cl | Centro de Mando</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Reseteo básico para evitar el pantallazo gris vacío */
        * { box-sizing: border-box; }
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #e7e3e0; /* Tu color base */
            color: #2d3436;
            min-height: 100vh;
        }

        /* Navbar estilo la imagen que subiste */
        nav {
            background-color: #2d3436;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        .logo { font-weight: 700; font-size: 1.2rem; }
        .lang-btn { 
            background: transparent; border: 1px solid white; color: white;
            padding: 5px 15px; border-radius: 4px; cursor: pointer;
        }

        /* Contenedor principal - Aseguramos visibilidad */
        .main-content {
            max-width: 1100px;
            margin: 30px auto;
            padding: 0 20px;
            display: block !important; /* Forzamos visibilidad */
        }

        .alert-bar {
            background: #000;
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 25px;
            font-size: 0.9rem;
        }

        /* Dashboard Grid */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        .status-dot {
            width: 12px; height: 12px; border-radius: 50%;
            background: #2ecc71; /* Verde operativo */
        }

        .btn-wa {
            background: #25D366;
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            font-weight: 700;
            margin-top: 15px;
            cursor: pointer;
        }

        h2 { margin: 0 0 5px 0; font-size: 1.1rem; }
        p { margin: 5px 0; font-size: 0.9rem; color: #636e72; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">HiPatagonia.cl</div>
        <button class="lang-btn">English</button>
    </nav>

    <div class="main-content">
        
        <div class="alert-bar">
            <strong>AVISO:</strong> Cruce Primera Angostura operando con normalidad. Viento 40km/h.
        </div>

        <div class="dashboard">
            <div class="card">
                <div class="card-header">
                    <h2>Primera Angostura</h2>
                    <div class="status-dot"></div>
                </div>
                <p><strong>Estado:</strong> Abierto</p>
                <p><strong>Espera:</strong> 15 - 20 min</p>
                <button class="btn-wa">Recibir Alerta WhatsApp</button>
            </div>

            <div class="card">
                <div class="card-header">
                    <h2>Paso Integración Austral</h2>
                    <div class="status-dot"></div>
                </div>
                <p><strong>Estado:</strong> Abierto</p>
                <p><strong>Tránsito:</strong> Fluido</p>
                <button class="btn-wa">Recibir Alerta WhatsApp</button>
            </div>

            <div class="card">
                <div class="card-header">
                    <h2>Río Don Guillermo</h2>
                    <div class="status-dot" style="background:#f1c40f"></div>
                </div>
                <p><strong>Estado:</strong> Precaución</p>
                <p><strong>Nieve:</strong> Uso de cadenas</p>
                <button class="btn-wa">Recibir Alerta WhatsApp</button>
            </div>
        </div>

    </div>

</body>
</html>
