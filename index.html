<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HiPatagonia | Muy Pronto</title>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a; /* El azul oscuro de tu marca */
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .container {
            padding: 20px;
            max-width: 600px;
        }

        .logo {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .divider {
            width: 50px;
            height: 3px;
            background-color: #fbbf24; /* El amarillo de acento */
            margin: 20px auto;
        }

        h1 {
            font-size: 24px;
            font-weight: 300;
            line-height: 1.6;
            color: #94a3b8;
        }

        .highlight {
            color: white;
            font-weight: 600;
        }

        .footer {
            position: absolute;
            bottom: 30px;
            font-size: 12px;
            color: #475569;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">🏔️ HIPATAGONIA</div>
        <div class="divider"></div>
        <h1>
            Estamos preparando la plataforma definitiva para las <br>
            <span class="highlight">Rutas y Viajes Patagónicos.</span>
        </h1>
        <p style="color: #64748b; margin-top: 30px; font-size: 14px;">
            Nuestro centro de control operativo está en fase de configuración técnica.
        </p>
    </div>

    <div class="footer">
        © 2026 HIPATAGONIA - PUNTA ARENAS, CHILE
    </div>

</body>
</html>
