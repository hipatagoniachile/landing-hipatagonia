<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HiPatagonia.cl</title>
    <style>
        /* Forzamos que el contenido ocupe espacio */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            background-color: #e7e3e0 !important;
            display: block !important;
        }

        nav {
            background-color: #2d3436;
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* El contenedor debe tener una altura mínima para que se vea */
        .content-debug {
            padding: 40px 20px;
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }

        .card-test {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            margin-top: 20px;
            border: 2px solid #000; /* Borde negro para que se note */
        }

        h1 { color: #2d3436; }
        .btn-check {
            background: #25D366;
            color: white;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <nav>
        <div style="font-weight: bold; font-size: 1.5rem;">HiPatagonia.cl</div>
        <div><button style="color:white; background:none; border:1px solid white; padding:5px 10px;">English</button></div>
    </nav>

    <div class="content-debug">
        <h1>¡Si ves esto, el sistema está funcionando!</h1>
        <p>Estamos reconstruyendo el dashboard de control.</p>
        
        <div class="card-test">
            <h2>Prueba de Conectividad</h2>
            <p>Estado: <strong>OPERATIVO</strong></p>
            <button class="btn-check">ESTO ES UN BOTÓN DE PRUEBA</button>
        </div>
    </div>

</body>
</html>
